<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#71BE1E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="40" height="40" rx="6" fill="url(#grad1)"/>
  
  <!-- Robot body -->
  <circle cx="20" cy="18" r="8" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Robot head -->
  <circle cx="20" cy="10" r="5" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Eyes -->
  <circle cx="18" cy="9" r="1.5" fill="#333333"/>
  <circle cx="22" cy="9" r="1.5" fill="#333333"/>
  
  <!-- Antenna -->
  <line x1="20" y1="5" x2="20" y2="2" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="20" cy="2" r="1.5" fill="#FF6B6B"/>
  
  <!-- Wheels -->
  <circle cx="14" cy="28" r="3" fill="#666666"/>
  <circle cx="26" cy="28" r="3" fill="#666666"/>
  
  <!-- Arm left -->
  <line x1="12" y1="18" x2="8" y2="22" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Arm right -->
  <line x1="28" y1="18" x2="32" y2="22" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
